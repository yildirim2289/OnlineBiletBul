<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üye Girişi | BiletBul</title>
    <style>
        :root {
            --primary-accent: #FFB6C1; 
            --accent-glow: rgba(255, 182, 193, 0.4);
            color-scheme: dark;
            --pure-black: #000000;
            --card-bg: rgba(20, 20, 20, 0.8);
            --border-color: #333333;
            --text-main: #FFFFFF;
            --text-muted: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--pure-black);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: url('uyegirisarkaplan.png'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
        }

        header {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            color: var(--pure-black);
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            -webkit-text-stroke: 1.5px var(--primary-accent);
            text-shadow: 0 0 15px var(--accent-glow);
            transition: all 0.3s ease;
        }

        .logo:hover { color: var(--primary-accent); }

        .header-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .header-links a {
            color: #f8deec;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .header-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--primary-accent);
            transition: width 0.3s ease;
        }

        .header-links a:hover { color: var(--text-main); }
        .header-links a:hover::after { width: 100%; }

        .login-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 480px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary-accent);
            box-shadow: 0 0 15px var(--primary-accent);
        }

        .glass-card h2 {
            font-size: 26px;
            margin-bottom: 10px;
            color: var(--text-main);
            text-align: center;
            font-weight: 600;
        }

        .glass-card p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 25px;
        }

        .input-group label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            padding: 16px 20px;
            border-radius: 10px;
            font-size: 16px;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 15px rgba(255, 182, 193, 0.2);
            background: rgba(0, 0, 0, 0.8);
        }

        .btn {
            width: 100%;
            padding: 18px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            border: none;
        }

        .btn-primary {
            background: var(--primary-accent);
            color: var(--pure-black);
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #FFC0CB;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary-accent);
            border: 2px solid var(--primary-accent);
            margin-top: 15px;
        }

        .btn-outline:hover {
            background: rgba(255, 182, 193, 0.1);
        }

        .divider-text {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin: 30px 0 20px 0;
        }

        .divider-text::before,
        .divider-text::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider-text:not(:empty)::before { margin-right: 15px; }
        .divider-text:not(:empty)::after { margin-left: 15px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">BiletBul</a>
        <div class="header-links">
            <a href="sorgula.html">Seyahat Sorgula</a>
            <div id="authArea">
            <a href="login.html" id="loginBtn">Üye Girişi</a>
            </div>
        </div>
    </header>

    <div class="login-wrapper">
        <div class="glass-card">
            <h2>Hoş Geldiniz</h2>
            <p class="subtitle">Biletlerinizi yönetmek için giriş yapın</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">E-Posta Adresi</label>
                    <input type="email" id="email" name="email" placeholder="ornek@mail.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary">Giriş Yap</button>
                
                <div class="divider-text">Hesabınız yok mu?</div>
                
                <a href="register.html" class="btn btn-outline" style="text-decoration: none; display: block;">Hemen Üye Ol</a>
            </form>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Kullanıcı bilgilerini tarayıcıya kaydet
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    alert(`Giriş Başarılı! Hoş geldin ${data.user.ad}`);
                    
                    // Giriş sonrası kullanıcıyı ana sayfaya yönlendir
                    window.location.href = "index.html"; 
                } else {
                    alert(data.message);
                }
            } catch (error) {
                console.error('Hata:', error);
                alert("Sunucuya bağlanılamadı!");
            }
        });








        function updateNavbar() {
        const authArea = document.getElementById('authArea');
        const user = JSON.parse(localStorage.getItem('user'));

        if (user) {
            // Eğer giriş yapılmışsa: Mevcut butonu silip yerine isim ve çıkış butonu koyar
            authArea.innerHTML = `
                <span style="color: var(--text-main); margin-right: 10px; font-weight: 500;">Merhaba, ${user.ad}</span>
                <div class="header-links">
                    <a href="#" onclick="logout()" style="text-transform: none;">Çıkış Yap</a>
                </div>
            `;
        }
        }

        function logout() {
        if(confirm("Çıkış yapmak istediğinize emin misiniz?")) {
            localStorage.removeItem('user');
            // Seçilen koltuklar gibi geçici verileri de temizleyelim
            localStorage.removeItem('secilenKoltuklar');
            window.location.href = "index.html";
        }
        }

        // Sayfa açıldığında kontrolü çalıştır
        document.addEventListener('DOMContentLoaded', updateNavbar);

    </script>
</body>
</html>
